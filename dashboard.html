<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>
<h2>Upload File</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file">
    <button type="submit">Upload</button>
</form>

<h2>Transfer Logs</h2>
<table border="1">
<tr>
    <th>Filename</th>
    <th>User</th>
    <th>Action</th>
    <th>IP</th>
    <th>Time</th>
    <th>Status</th>
</tr>
{% for log in logs %}
<tr>
    <td>{{ log.filename }}</td>
    <td>{{ log.username }}</td>
    <td>{{ log.action }}</td>
    <td>{{ log.ip_address }}</td>
    <td>{{ log.timestamp }}</td>
    <td>{{ log.status }}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
